<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form & Media Examples</title>
</head>
<body>

    <!-- ==================== FORM SECTION ==================== -->
    <h2>User Registration Form</h2>
    <form method="post" action="/submit.php" target="_blank" enctype="multipart/form-data">

        <!-- Text Input -->
        <label>Name:</label>
        <input type="text" name="username" placeholder="Enter your name" required>
        <br><br>

        <!-- Email Input -->
        <label>Email:</label>
        <input type="email" name="email" placeholder="Enter email" required>
        <br><br>

        <!-- Telephone Input -->
        <label>Phone:</label>
        <input type="tel" name="phone" placeholder="123-456-7890">
        <br><br>

        <!-- Date Picker -->
        <label>Date of Birth:</label>
        <input type="date" name="dob">
        <br><br>

        <!-- Number Input -->
        <label>Age:</label>
        <input type="number" name="age" min="1" max="120">
        <br><br>

        <!-- Radio Buttons -->
        <label>Gender:</label>
        <input type="radio" name="gender" value="male"> Male
        <input type="radio" name="gender" value="female"> Female
        <br><br>

        <!-- Checkboxes -->
        <label>Hobbies:</label>
        <input type="checkbox" name="hobbies" value="cricket"> Cricket
        <input type="checkbox" name="hobbies" value="music"> Music
        <input type="checkbox" name="hobbies" value="reading"> Reading
        <br><br>

        <!-- Select Dropdown -->
        <label>Course:</label>
        <select name="course">
            <option>HTML</option>
            <option>CSS</option>
            <option>JavaScript</option>
            <option>React</option>
        </select>
        <br><br>

        <!-- Color Picker -->
        <label>Favourite Color:</label>
        <input type="color" name="favcolor">
        <br><br>

        <!-- Range Slider -->
        <label>Skill Level (0-100):</label>
        <input type="range" name="skill" min="0" max="100" value="50">
        <br><br>

        <!-- File Upload -->
        <label>Upload Resume:</label>
        <input type="file" name="resume">
        <br><br>

        <!-- Textarea -->
        <label>Message:</label>
        <textarea name="message" rows="4" cols="30" placeholder="Your message..."></textarea>
        <br><br>

        <!-- Submit Button -->
        <input type="submit" value="Submit Form">
        <button type="reset">Reset</button>   <!-- extra button to clear form -->
    </form>

    <hr>

    <!-- ==================== MEDIA TAGS SECTION ==================== -->
    <h2>Audio & Video Example</h2>

    <!-- Audio Player -->
    <h3>Audio Player</h3>
    <audio controls muted loop>
        <!-- Primary source -->
        <source src="song.mp3" type="audio/mpeg">
        <!-- Fallback source -->
        <source src="song.ogg" type="audio/ogg">
        Your browser does not support the audio element.
    </audio>

    <br><br>

    <!-- Video Player -->
    <h3>Video Player</h3>
    <video width="500" controls poster="thumbnail.jpg">
        <source src="video.mp4" type="video/mp4">
        <source src="video.webm" type="video/webm">
        <!-- Fallback message if none of the sources work -->
        Your browser does not support the video tag.
    </video>

    <!-- Using media attribute for responsive video source (optional) -->
    <video controls width="500">
        <source src="large-video.mp4" media="(min-width: 800px)">
        <source src="small-video.mp4" media="(max-width: 799px)">
        Your browser does not support video.
    </video>

</body>
</html>
